<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Емтихан Конспектісі</title>

<style>
:root{
 --primary:#2563eb;
 --secondary:#7c3aed;
 --bg:#f5f7fb;
 --card:#fff;
 --text:#222;
}

.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Segoe UI,sans-serif;
}

body{
 background:var(--bg);
 color:var(--text);
 transition:.3s;
}

header{
 background:linear-gradient(135deg,var(--primary),var(--secondary));
 color:white;
 text-align:center;
 padding:40px 20px;
}

header h1{
 margin-bottom:10px;
}

.controls{
 max-width:1200px;
 margin:20px auto;
 display:flex;
 gap:10px;
 padding:0 15px;
 flex-wrap:wrap;
}

input{
 flex:1;
 min-width:250px;
 padding:12px;
 border:none;
 border-radius:10px;
}

button{
 cursor:pointer;
}

.theme-btn{
 padding:12px 16px;
 border:none;
 border-radius:10px;
}

.tabs{
 max-width:1200px;
 margin:auto;
 padding:0 15px;
 display:flex;
 flex-wrap:wrap;
 gap:10px;
}

.tab-btn{
 border:none;
 padding:12px 18px;
 border-radius:10px;
 background:#ddd;
}

.tab-btn.active{
 background:var(--primary);
 color:white;
}

.content{
 max-width:1200px;
 margin:auto;
 padding:20px 15px;
}

.tab{
 display:none;
}

.tab.active{
 display:block;
}

details{
 background:var(--card);
 margin-bottom:12px;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 4px 10px rgba(0,0,0,.1);
}

summary{
 padding:18px;
 font-weight:600;
 cursor:pointer;
}

.answer{
 padding:20px;
 line-height:1.8;
 border-top:1px solid rgba(0,0,0,.1);
}

footer{
 text-align:center;
 padding:30px;
 opacity:.7;
}
</style>
</head>

<body>

<header>
<h1>📚 Емтихан Конспектісі</h1>
<p>Сұрақтар мен жауаптар жинағы</p>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Сұрақ іздеу...">
<button class="theme-btn" onclick="toggleTheme()">🌙 Тақырып</button>
</div>

<div class="tabs">
<button class="tab-btn active" data-tab="math">
Мәліметтерді талдау
</button>

<button class="tab-btn" data-tab="ml">
Машиналық оқыту
</button>

<button class="tab-btn" data-tab="iis">
ИАЖ
</button>

<button class="tab-btn" data-tab="essay">
Эссе
</button>
</div>

<div class="content">

<div id="math" class="tab active"></div>
<div id="ml" class="tab"></div>
<div id="iis" class="tab"></div>
<div id="essay" class="tab"></div>

</div>

<footer>
© 2026
</footer>

<script>

let DATA = {};

fetch('questions.json')
.then(r=>r.json())
.then(data=>{
 DATA=data;
 render();
});

function render(){

 Object.keys(DATA).forEach(category=>{

   const container =
   document.getElementById(category);

   if(!container) return;

   container.innerHTML='';

   DATA[category].forEach(item=>{

     container.innerHTML += `
      <details>
       <summary>${item.question}</summary>
       <div class="answer">
       ${item.answer}
       </div>
      </details>
     `;

   });

 });

}

document.querySelectorAll('.tab-btn')
.forEach(btn=>{

 btn.onclick=()=>{

   document
   .querySelectorAll('.tab-btn')
   .forEach(x=>x.classList.remove('active'));

   document
   .querySelectorAll('.tab')
   .forEach(x=>x.classList.remove('active'));

   btn.classList.add('active');

   document
   .getElementById(btn.dataset.tab)
   .classList.add('active');

 };

});

function toggleTheme(){
 document.body.classList.toggle('dark');
}

document
.getElementById('search')
.addEventListener('input',e=>{

 const q=e.target.value.toLowerCase();

 document
 .querySelectorAll('details')
 .forEach(item=>{

   item.style.display=
   item.innerText
   .toLowerCase()
   .includes(q)
   ? 'block'
   : 'none';

 });

});

</script>

</body>
</html>
